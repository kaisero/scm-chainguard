stages:
  - lint
  - test
  - publish
  - mirror

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

.python-base:
  image: python:3.11-slim
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .pip-cache/

lint:
  extends: .python-base
  stage: lint
  script:
    - pip install ruff
    - ruff check src/ tests/
    - ruff format --check src/ tests/

test:
  extends: .python-base
  stage: test
  script:
    - pip install -e ".[dev]"
    - pytest --junitxml=report.xml --cov=scm_chainguard --cov-report=term-missing
  artifacts:
    when: always
    reports:
      junit: report.xml
    expire_in: 30 days

publish:
  extends: .python-base
  stage: publish
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - VERSION
  script:
    - pip install build twine
    - python -m build
    - twine upload dist/*
  variables:
    TWINE_USERNAME: $PYPI_USERNAME
    TWINE_PASSWORD: $PYPI_PASSWORD

mirror-to-github:
  stage: mirror
  image: alpine:latest
  before_script:
    - apk add --no-cache git
  script:
    - git clone --mirror "$CI_REPOSITORY_URL" repo.git
    - cd repo.git
    - git remote add github "https://x-access-token:${GITHUB_PAT}@github.com/kaisero/scm-chainguard.git"
    - git push github --mirror
